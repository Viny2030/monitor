name: Refresh Diario Monitor IRI

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC = 07:00 ARG
  workflow_dispatch:        # permite correrlo manualmente desde GitHub

jobs:
  refresh:
    name: Regenerar Dataset
    runs-on: ubuntu-latest
    steps:
      - name: Llamar POST /refresh
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "X-Refresh-Token: ${{ secrets.REFRESH_TOKEN }}" \
            https://monitor-production-f053.up.railway.app/refresh)
          echo "HTTP Status: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Refresh fallido con status $RESPONSE"
            exit 1
          fi
          echo "✅ Refresh exitoso"

  notificar:
    name: Notificaciones
    runs-on: ubuntu-latest
    needs: refresh
    if: always()
    steps:
      - name: Capturar fecha
        id: fecha
        run: echo "fecha=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Notificar exito
        if: needs.refresh.result == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          to: viny01958@gmail.com
          from: Monitor IRI <${{ secrets.MAIL_USER }}>
          subject: "✅ Refresh OK - Monitor IRI ${{ steps.fecha.outputs.fecha }}"
          body: |
            El dataset del Monitor IRI fue regenerado correctamente.
            Fecha: ${{ steps.fecha.outputs.fecha }}
            Ver: https://monitor-production-f053.up.railway.app/dashboard

      - name: Notificar fallo
        if: needs.refresh.result == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          to: viny01958@gmail.com
          from: Monitor IRI <${{ secrets.MAIL_USER }}>
          subject: "❌ Refresh FALLÓ - Monitor IRI ${{ steps.fecha.outputs.fecha }}"
          body: |
            El refresh diario del Monitor IRI falló.
            Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
